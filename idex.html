<!DOCTYPE html>

<head>

        body {
            font-family: Arial, sans-serif;
            background-color: #eca4a4;
            margin: 0;
            padding: 0;
            text-align: center;
        }

        header {
            background-color: #ebc1d8; /* Mude a cor do topo aqui */
            color: white;
            padding: 30px;
        }

        .conteudo {
            background-color: white;
            max-width: 600px;
            margin: 30px auto;
            padding: 20px;
            border-radius: 10px;
        }

        .foto-principal {
            width: 100%;
            max-height: 350px;
            object-fit: cover;
            border-radius: 8px;
        }

        p {
            color: #333333;
            font-size: 18px;
            line-height: 1.6;
        }

        footer {
            background-color: #2c3e50;
            color: white;
            padding: 15px;
            margin-top: 30px;
        }
    </style>
</head>
